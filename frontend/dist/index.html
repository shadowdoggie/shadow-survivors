<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="dynamic-favicon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hot or Cold Word Game</title>
    
    <script>
      // Generate a random letter favicon
      const canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const char = letters.charAt(Math.floor(Math.random() * letters.length));
      
      // Background (Random darkish color)
      const r = Math.floor(Math.random() * 150);
      const g = Math.floor(Math.random() * 150);
      const b = Math.floor(Math.random() * 150);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.beginPath();
      ctx.arc(32, 32, 32, 0, 2 * Math.PI);
      ctx.fill();
      
      // Letter
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 40px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(char, 32, 34);
      
      document.getElementById('dynamic-favicon').href = canvas.toDataURL();
    </script>
